<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title></title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #f8f9ff 0%, #e9f0f5 100%);
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .board {
            max-width: 1300px;
            width: 100%;
            background: rgba(255,255,240,0.95);
            border-radius: 80px 80px 70px 70px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
            padding: 20px 20px 30px;
        }
        .area-container {
            display: flex;
            flex-wrap: nowrap;
            gap: 25px;
            justify-content: center;
            align-items: flex-start;
        }
        .combined-area {
            width: 280px;
            flex-shrink: 0;
            background: #fffaf0;
            border-radius: 55px;
            padding: 20px 15px;
            border: 3px solid #ffdfa5;
        }
        .shapes-area {
            flex: 1;
            background: #fef6e8;
            border-radius: 55px;
            padding: 20px 15px;
            border: 3px solid #ffdfa5;
        }
        .canvas-combined {
            width: 100%;
            height: 420px;
            background: #f7efdb;
            border-radius: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 0 3px #ffe2ae;
            perspective: 1400px;
            cursor: grab;
            touch-action: none;
        }
        .wrap-3d {
            position: relative;
            transform-style: preserve-3d;
        }
        .grid-2x3 {
            width: 480px;
            height: 240px;
            background-image: linear-gradient(#999 1px, transparent 1px),linear-gradient(90deg, #999 1px, transparent 1px);
            background-size: 60px 60px;
            border: 1px solid #999;
            background-color: #fff;
        }
        .hover-red-box {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 3px solid #f53f3f;
            background: rgba(245,63,63,0.15);
            pointer-events: none;
            display: none;
        }
        .shape-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }
        .source-block {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            cursor: grab;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        .solid-block {
            width: 60px;
            height: 60px;
            position: absolute;
            transform-style: preserve-3d;
            transform-origin: center center;
        }
        .solid-block > div {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 1px solid rgba(0,0,0,0.15);
        }
        .b-front  { transform: translateZ(30px); }
        .b-back   { transform: translateZ(-30px) rotateY(180deg); }
        .b-left   { transform: translateX(-30px) rotateY(-90deg); }
        .b-right  { transform: translateX(30px)  rotateY(90deg); }
        .b-top    { transform: translateY(-30px) rotateX(90deg); }
        .b-bottom { transform: translateY(30px)  rotateX(-90deg); }
    </style>
</head>
<body>
<div class="board">
    <div class="area-container">
        <div class="combined-area">
            <div class="shape-grid">
                <div class="source-block" style="background:#ff9999" draggable="true"></div>
                <div class="source-block" style="background:#99ccff" draggable="true"></div>
                <div class="source-block" style="background:#99ff99" draggable="true"></div>
                <div class="source-block" style="background:#ffcc99" draggable="true"></div>
            </div>
        </div>
        <div class="shapes-area">
            <div class="canvas-combined" id="viewBox">
                <div class="wrap-3d" id="main3d">
                    <div class="grid-2x3"></div>
                    <div class="hover-red-box" id="redPreview"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const viewBox = document.getElementById('viewBox');
const main3d = document.getElementById('main3d');
const redPreview = document.getElementById('redPreview');
const SIZE = 60;
const ROW = 4;
const COL = 8;

const gridPos = [];
for (let r = 0; r < ROW; r++) {
  for (let c = 0; c < COL; c++) {
    gridPos.push([c * SIZE, r * SIZE]);
  }
}
let gridUsed = Array(ROW * COL).fill(false);
let curHoverIndex = -1;

let rotateX = -25;
let rotateY = 35;
let isDragging = false;
let lastX, lastY;

// 鼠标旋转
viewBox.addEventListener('mousedown', (e) => {
  isDragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  viewBox.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  rotateY += dx * 0.15;
  rotateX -= dy * 0.15;
  rotateX = Math.max(-60, Math.min(30, rotateX));
  main3d.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  lastX = e.clientX;
  lastY = e.clientY;
});
window.addEventListener('mouseup', () => {
  isDragging = false;
  viewBox.style.cursor = 'grab';
});

// 希沃触摸旋转
viewBox.addEventListener('touchstart', (e) => {
  if (e.touches.length !== 1) return;
  isDragging = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
  e.preventDefault();
});
window.addEventListener('touchmove', (e) => {
  if (!isDragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;
  rotateY += dx * 0.15;
  rotateX -= dy * 0.15;
  rotateX = Math.max(-60, Math.min(30, rotateX));
  main3d.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
  e.preventDefault();
});
window.addEventListener('touchend', () => {
  isDragging = false;
});

// 拖拽方块
let dragColor = '';
document.querySelectorAll('.source-block').forEach(el => {
  el.ondragstart = () => dragColor = el.style.backgroundColor;
});

viewBox.ondragover = e => e.preventDefault();
viewBox.ondragleave = () => redPreview.style.display = 'none';

viewBox.ondragover = e => {
  e.preventDefault();
  const rect = main3d.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const col = Math.floor(x / SIZE);
  const row = Math.floor(y / SIZE);
  const idx = row * COL + col;
  if (idx >= 0 && idx < gridPos.length && !gridUsed[idx]) {
    curHoverIndex = idx;
    redPreview.style.left = gridPos[idx][0] + 'px';
    redPreview.style.top = gridPos[idx][1] + 'px';
    redPreview.style.display = 'block';
  } else {
    redPreview.style.display = 'none';
    curHoverIndex = -1;
  }
};

viewBox.ondrop = e => {
  e.preventDefault();
  redPreview.style.display = 'none';
  if (curHoverIndex === -1 || !dragColor) return;
  gridUsed[curHoverIndex] = true;
  const [px, py] = gridPos[curHoverIndex];
  const cube = document.createElement('div');
  cube.className = 'solid-block';
  cube.style.left = px + 'px';
  cube.style.top = py + 'px';
  ['front','back','left','right','top','bottom'].forEach(n => {
    const d = document.createElement('div');
    d.className = 'b-' + n;
    d.style.background = dragColor;
    cube.appendChild(d);
  });
  main3d.appendChild(cube);
};
</script>
</body>
</html>
